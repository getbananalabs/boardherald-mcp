# Maintained upstream. This file is kept in sync by automation;
# edits made directly to this repo will be overwritten on the next
# release.
name: Release to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing v$TAG"

      - name: Smoke-check bridge script
        run: node --check scripts/mcp-bridge.mjs

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
